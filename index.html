<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>短歌画像メーカー</title>
        <link rel="stylesheet" href="style.css">
        <link
            href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Hina+Mincho&family=Kaisei+Decol:wght@400;700&family=Kaisei+Opti:wght@400;700&family=Kosugi&family=Kosugi+Maru&family=M+PLUS+1p:wght@400;700&family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&family=Sawarabi+Gothic&family=Sawarabi+Mincho&family=Shippori+Antique+B1&family=Shippori+Mincho:wght@400;700&family=Yomogi&family=Yuji+Boku&family=Yuji+Mai&family=Yuji+Syuku&family=Yusei+Magic&family=Zen+Antique&family=Zen+Kaku+Gothic+New:wght@400;700&family=Zen+Kurenaido&family=Zen+Maru+Gothic:wght@400;700&family=Zen+Old+Mincho:wght@400;700&display=swap"
            rel="stylesheet">
    </head>
    <body>

        <h1>短歌画像ジェネレーター</h1>

        <div class="container">
            <aside class="controls">
                <div class="tab-menu settings-tab-menu" role="tablist" aria-label="編集項目">
                    <button type="button" class="tab-button is-active" role="tab" aria-selected="true" data-settings-tab="tanka" id="tankaSettingsTabBtn">短歌の設定</button>
                    <button type="button" class="tab-button" role="tab" aria-selected="false" data-settings-tab="author" id="authorSettingsTabBtn">作者名の設定</button>
                </div>

                <div class="settings-panel" id="tankaSettingsPanel">
                    <div class="field">
                        <label for="tankaInput">短歌を入力 (改行で調整)</label>
                        <textarea id="tankaInput"
                            placeholder="五七五七七を入力">ひさかたの&#13;光のどけき&#13;春の日に&#13;しづ心なく&#13;花の散るらむ</textarea>
                    </div>

                    <div class="field">
                        <label>文字レイアウト</label>
                        <div class="tab-menu" role="tablist"
                            aria-label="文字レイアウト設定モード">
                            <button type="button" class="tab-button is-active"
                                role="tab" aria-selected="true"
                                data-layout-mode="preset"
                                id="presetTabBtn">プリセット</button>
                            <button type="button" class="tab-button" role="tab"
                                aria-selected="false" data-layout-mode="detail"
                                id="detailTabBtn">詳細設定</button>
                        </div>

                        <div class="layout-panel" id="presetPanel">
                            <div class="size-options">
                                <label class="radio-label">
                                    <input type="radio" name="layoutPreset"
                                        value="multiline" checked>
                                    複数行向け
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="layoutPreset"
                                        value="singleline">
                                    一行向け
                                </label>
                            </div>
                        </div>

                        <div class="layout-panel is-hidden" id="detailPanel">
                            <div class="detail-grid">
                                <label for="fontSizeInput">文字サイズ(px)</label>
                                <input type="number" id="fontSizeInput" min="12"
                                    max="120" value="42">

                                <label for="lineSpacingInput">列間(px)</label>
                                <input type="number" id="lineSpacingInput" min="20"
                                    max="240" value="70">

                                <label for="topMarginInput">上余白(px)</label>
                                <input type="number" id="topMarginInput" min="0"
                                    max="400" value="80">

                                <label for="rightMarginInput">右余白(px)</label>
                                <input type="number" id="rightMarginInput" min="0"
                                    max="500" value="100">

                                <label for="charSpacingInput">文字間隔(倍率)</label>
                                <input type="number" id="charSpacingInput" min="0.8"
                                    max="2" step="0.05" value="1.1">
                            </div>
                        </div>
                    </div>

                    <div class="field">
                        <label for="fontSelect">フォント</label>
                        <select id="fontSelect">
                            <optgroup label="明朝・セリフ系">
                                <option value="'Noto Serif JP', serif">Noto Serif JP (標準)</option>
                                <option value="'Sawarabi Mincho', serif">さわらび明朝 (繊細)</option>
                                <option value="'Shippori Mincho', serif">しっぽり明朝 (古典)</option>
                                <option value="'Zen Old Mincho', serif">Zen Old Mincho (重厚)</option>
                                <option value="'Hina Mincho', serif">Hina Mincho (柔らか)</option>
                                <option value="'Kaisei Opti', serif">Kaisei Opti (可読)</option>
                                <option value="'Kaisei Decol', serif">Kaisei Decol (装飾)</option>
                                <option value="'Yuji Syuku', serif">Yuji Syuku (書道風)</option>
                                <option value="'Yuji Mai', serif">Yuji Mai (優雅)</option>
                                <option value="'Yuji Boku', serif">Yuji Boku (筆文字)</option>
                            </optgroup>
                            <optgroup label="ゴシック・サンセリフ系">
                                <option value="'Noto Sans JP', sans-serif">Noto Sans JP (モダン)</option>
                                <option value="'Zen Kaku Gothic New', sans-serif">Zen Kaku Gothic New (端正)</option>
                                <option value="'Zen Maru Gothic', sans-serif">Zen Maru Gothic (丸み)</option>
                                <option value="'M PLUS 1p', sans-serif">M PLUS 1p (汎用)</option>
                                <option value="'Kosugi', sans-serif">Kosugi (直線的)</option>
                                <option value="'Kosugi Maru', sans-serif">Kosugi Maru (やわらか)</option>
                                <option value="'Sawarabi Gothic', sans-serif">さわらびゴシック (軽快)</option>
                            </optgroup>
                            <optgroup label="個性派・ディスプレイ系">
                                <option value="'Yusei Magic', sans-serif">Yusei Magic (ポップ)</option>
                                <option value="'Yomogi', cursive">Yomogi (手書き)</option>
                                <option value="'Zen Kurenaido', sans-serif">Zen Kurenaido (味わい)</option>
                                <option value="'Shippori Antique B1', serif">Shippori Antique B1 (レトロ)</option>
                                <option value="'Zen Antique', serif">Zen Antique (力強い)</option>
                                <option value="'DotGothic16', monospace">DotGothic16 (ドット)</option>
                            </optgroup>
                        </select>
                    </div>

                    <div class="field-group">
                        <div class="field">
                            <label for="textColor">文字色</label>
                            <input type="color" id="textColor" value="#333333">
                        </div>
                        <div class="field">
                            <label for="bgColor">背景色</label>
                            <input type="color" id="bgColor" value="#ffffff">
                        </div>
                    </div>

                    <div class="field">
                        <label>画像サイズ</label>
                        <div class="size-options">
                            <label class="radio-label">
                                <input type="radio" name="imageSize" value="800x800"
                                    checked>
                                正方形（800×800）
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="imageSize"
                                    value="960x1280">
                                960（横）×1280（縦）
                            </label>
                        </div>
                    </div>
                </div>

                <div class="settings-panel is-hidden" id="authorSettingsPanel">
                    <div class="field">
                        <label for="authorInput">作者名</label>
                        <input type="text" id="authorInput" placeholder="例: 山田 花子">
                    </div>

                    <div class="field">
                        <label>表示ラベル</label>
                        <div class="size-options">
                            <label class="radio-label">
                                <input type="checkbox" id="showAuthorLabel" data-label-toggle="author" checked>
                                「作者」を表示
                            </label>
                            <label class="radio-label">
                                <input type="checkbox" id="showXLabel" data-label-toggle="x" checked>
                                「X」を表示
                            </label>
                            <label class="radio-label">
                                <input type="checkbox" id="showInstagramLabel" data-label-toggle="instagram" checked>
                                「Instagram」を表示
                            </label>
                            <label class="radio-label">
                                <input type="checkbox" id="showThreadLabel" data-label-toggle="threads" checked>
                                「Thread」を表示
                            </label>
                        </div>
                    </div>

                    <div class="field">
                        <label>SNSアカウント（表示するものを選択）</label>
                        <div class="sns-list">
                            <label class="sns-item" for="snsXEnabled">
                                <input type="checkbox" id="snsXEnabled" data-sns="x">
                                <span>X</span>
                            </label>
                            <input type="text" id="snsXInput" data-sns-input="x" placeholder="@your_x_id">

                            <label class="sns-item" for="snsInstagramEnabled">
                                <input type="checkbox" id="snsInstagramEnabled" data-sns="instagram">
                                <span>Instagram</span>
                            </label>
                            <input type="text" id="snsInstagramInput" data-sns-input="instagram" placeholder="@your_instagram_id">

                            <label class="sns-item" for="snsThreadsEnabled">
                                <input type="checkbox" id="snsThreadsEnabled" data-sns="threads">
                                <span>Thread</span>
                            </label>
                            <input type="text" id="snsThreadsInput" data-sns-input="threads" placeholder="@your_threads_id">
                        </div>
                    </div>
                </div>

                <button class="btn-download" id="downloadBtn">画像を保存する</button>
            </aside>

            <main class="preview-area">
                <canvas id="tankaCanvas" width="800" height="800"></canvas>
                <p class="hint" id="sizeHint">※800×800px の正方形で出力されます</p>
            </main>
        </div>

        <script src="script.js"></script>
    </body>
</html>
